<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MARATHON - 大枠プラットフォーム対戦室</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: #e0e0e0; padding: 10px; margin: 0; user-select: none; }
        .container { max-width: 600px; margin: 0 auto; padding: 5px; position: relative; }
        h1 { text-align: center; color: #ff4757; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 22px; text-shadow: 0 0 8px rgba(255,71,87,0.3); }
        
        .lobby-panel { background: #1e1e1e; border: 2px solid #333; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 15px; }
        
        .badge { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; margin-left: 5px; vertical-align: middle; }
        .rank-NORMAL { background: #747d8c; color: #fff; }
        .rank-ELITE { background: #2ed573; color: #fff; box-shadow: 0 0 8px rgba(46,213,115,0.4); }
        .rank-PREMIUM { background: #1e90ff; color: #fff; box-shadow: 0 0 8px rgba(30,144,255,0.4); }
        .rank-VIP { background: #ffa500; color: #fff; box-shadow: 0 0 12px rgba(255,165,0,0.6); }
        .rank-GUEST { background: #a4b0be; color: #2f3542; }

        .marathon-track { background: #222; border: 2px solid #333; border-radius: 12px; margin-bottom: 15px; position: relative; height: 70px; overflow: hidden; }
        .lane { height: 35px; position: relative; display: flex; align-items: center; transition: background-color 0.5s; }
        #lane-p1 { border-bottom: 1px dashed #444; background-color: #2e2e2e; }
        #lane-p2 { background-color: #2e2e2e; }
        .lane-label { font-size: 11px; color: #fff; font-weight: bold; position: absolute; left: 5px; z-index: 2; background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 3px; }
        .goal-line { position: absolute; right: 20px; top: 0; bottom: 0; width: 4px; background: repeating-linear-gradient(0deg, #fff, #fff 5px, #000 5px, #000 10px); z-index: 1; }
        .runner { font-size: 22px; position: absolute; left: 0%; transition: left 1s ease-out; transform: translateX(10px); z-index: 3; }
        
        .debt-badge { font-size: 9px; background: #ff4757; color: white; padding: 1px 4px; border-radius: 3px; margin-left: 5px; font-weight: bold; display: none; }
        .status-board { background: #1e1e1e; padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 15px; }
        .timer { font-size: 20px; color: #ffa502; font-weight: bold; font-family: monospace; }

        .game-area { display: none; position: relative; }
        .lock-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.05); z-index: 10; display: none; border-radius: 12px; }

        .field-board { background: #1e1e1e; border: 2px solid #333; border-radius: 16px; padding: 15px; margin-bottom: 15px; position: relative; }
        .field-section-title { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .field-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; position: relative; }
        .field-row.opponent-row { margin-bottom: 0; }
        
        .card-slot { background: #26262b; border: 2px dashed #444; border-radius: 10px; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all 0.3s; }
        .slot-label { font-size: 9px; color: #666; position: absolute; bottom: 4px; pointer-events: none; font-weight: bold; }

        .hand-section { background: #1c1c1e; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #444; }
        .card-container { display: flex; gap: 10px; justify-content: center; min-height: 90px; align-items: center; }

        .card { width: 65px; height: 85px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; cursor: grab; text-align: center; font-size: 13px; padding: 3px; box-sizing: border-box; transition: transform 0.2s, background 0.3s; z-index: 2; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .card[data-type="sun"] { background: linear-gradient(135deg, #ff9f43, #ff5252); }
        .card[data-type="stone"] { background: linear-gradient(135deg, #57606f, #2f3542); }
        .card[data-type="water"] { background: linear-gradient(135deg, #54a0ff, #00d2d3); }
        .card[data-type="cheer"] { background: linear-gradient(135deg, #10ac84, #1dd1a1); }
        .card.mystery-card { background: linear-gradient(135deg, #2c3e50, #34495e); border: 2px solid #7f8c8d; color: #fff; font-size: 20px; font-weight: bold; cursor: not-allowed; }

        .field-cutin { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: white; z-index: 20; display: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); box-shadow: inset 0 0 20px rgba(255,255,255,0.2); }

        .event-trigger-section { background: #2f3542; border: 2px solid #ffa502; border-radius: 12px; padding: 10px; margin-bottom: 15px; text-align: center; display: none; }
        .event-btn { background: #ffa502; color: #000; font-weight: bold; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: #333; color: #ccc; border: 1px solid #444; padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .action-btn { background: #ff4757; color: #fff; border: none; padding: 12px; width: 100%; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }
        
        .bottom-info-panel { background: #1e1e1e; border: 1px solid #333; padding: 12px; border-radius: 12px; margin-top: 15px; }
        .chat-input-area { display: flex; gap: 5px; margin-top: 8px; }
        .chat-input-area input { flex: 1; padding: 8px; background: #26262b; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 12px; }
        .chat-send-btn { background: #54a0ff; color: #fff; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .chat-logs { max-height: 140px; overflow-y: auto; font-family: monospace; color: #4cd137; white-space: pre-wrap; line-height: 1.4; font-size: 12px; }
        .hidden { display: none !important; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" onclick="backToPlatformLobby()">↩ プラットフォームへ帰還</button>
        <h1>THE MARATHON</h1>
        <div style="width:90px;"></div>
    </div>
    
    <div id="lobby-panel" class="lobby-panel">
        <h2>マラソン公式レート対戦室</h2>
        <div style="background: #26262b; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
            <span style="font-size: 15px;">走者識別名: <span id="room-username" style="color:#2ed573; font-weight:bold;">----</span></span>
        </div>
        <button class="action-btn" id="match-btn" onclick="toggleMatchmaking()" style="padding: 15px; font-size: 18px;">公式レート対戦マッチング開始</button>
        <button class="action-btn" onclick="startAIModeTrigger()" style="background: #10ac84; margin-top: 10px;">思考AI戦（練習モード）</button>
    </div>

    <div id="matching-panel" class="lobby-panel hidden">
        <div style="width: 30px; height: 30px; border: 4px solid #333; border-top: 4px solid #ff4757; border-radius: 50%; margin: 0 auto 10px; animation: spin 1s linear infinite;"></div>
        <h3 style="color: #ffa502; margin: 5px 0;">対戦レーン同期中...</h3>
        <p id="matching-timer" style="font-size: 18px; font-weight: bold; margin: 5px 0;">経過時間: 0秒</p>
        <button class="action-btn" onclick="toggleMatchmaking()" style="background: #747d8c; margin-top: 10px; width: 60%;">探索をキャンセル</button>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <div class="game-area" id="game-area">
        <div class="lock-overlay" id="lock-overlay"></div>
        
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; background: #1c1c1e; padding: 5px 10px; border-radius: 6px;">
            <div>👤 P1: <span id="p1-name-card" style="font-weight:bold; color:#ff4757;">YOU</span> <span id="p1-rate-card" style="color:#aaa;"></span></div>
            <div>👥 P2: <span id="p2-name-card" style="font-weight:bold; color:#54a0ff;">ENEMY</span> <span id="p2-rate-card" style="color:#aaa;"></span></div>
        </div>

        <div class="marathon-track">
            <div class="goal-line"></div>
            <div class="lane" id="lane-p1">
                <span class="lane-label">P1 <span class="debt-badge" id="debt-p1">壁: 0%</span></span>
                <div class="runner" id="runner-p1">🏃</div>
            </div>
            <div class="lane" id="lane-p2">
                <span class="lane-label">P2 <span class="debt-badge" id="debt-p2">壁: 0%</span></span>
                <div class="runner" id="runner-p2">🏃</div>
            </div>
        </div>

        <div class="status-board">
            <div>ターン: <span id="turn-count">1</span></div>
            <div class="timer" id="timer-display">05:00</div>
        </div>

        <div class="event-trigger-section" id="event-panel">
            <p style="margin:0 0 5px 0; font-size:12px; color:#ffa502;">⚡ イベント実行権が与えられました</p>
            <button class="event-btn" id="evt-btn" onclick="declareEvent()">このターンにイベントを発動する</button>
        </div>

        <div class="field-board">
            <div class="field-section-title">👤 自分側のフィールド</div>
            <div class="field-row" id="my-field-row">
                <div class="field-cutin" id="cutin-my-field"></div>
                <div class="card-slot" id="slot-my-self"><span class="slot-label">📥自分用</span></div>
                <div class="card-slot" id="slot-my-target"><span class="slot-label">📤相手用</span></div>
                <div class="card-slot" id="slot-my-waste"><span class="slot-label">🗑️廃棄</span></div>
                <div class="card-slot" id="slot-my-keep"><span class="slot-label">📦保留</span></div>
            </div>

            <div class="field-section-title" style="margin-top:15px;">👥 相手側のフィールド</div>
            <div class="field-row opponent-row" id="opp-field-row">
                <div class="field-cutin" id="cutin-opp-field"></div>
                <div class="card-slot" id="slot-opp-self"><span class="slot-label">自分用</span></div>
                <div class="card-slot" id="slot-opp-target"><span class="slot-label">相手用</span></div>
                <div class="card-slot" id="slot-opp-waste"><span class="slot-label">廃棄</span></div>
                <div class="card-slot" id="slot-opp-keep"><span class="slot-label">保留</span></div>
            </div>
        </div>

        <div class="hand-section">
            <div class="section-title" id="hand-title">あなたの手札</div>
            <div class="card-container" id="zone-hand"></div>
        </div>

        <button class="action-btn" id="submit-btn" onclick="submitOnlineTurn()">配置を確定する</button>
    </div>

    <div class="bottom-info-panel">
        <div class="chat-logs" id="chat-logs">【システム】中央認証情報をロード中...</div>
        <div class="chat-input-area" id="chat-entry-panel">
            <input type="text" id="chat-input" placeholder="言葉で相手の心を揺さぶれ..." onkeydown="if(event.key==='Enter')sendChat()">
            <button class="chat-send-btn" onclick="sendChat()">送信</button>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let myPlayerNumber = 1; 
    let isAIMode = false;
    let timerInterval = null;
    let timerSeconds = 300;
    let localKeep = [];
    let isLocked = false;
    let eventReserved = false;
    let myUsername = null;
    let isMatching = false;
    let matchSeconds = 0;
    let matchTimerInterval = null;

    let aiState = {
        turn: 1, lastEventP1: -99, lastEventP2: -99, p1Reserved: false, p2Reserved: false,
        p1: { progress: 0, temp: 5, stoneCount: 0, cheerCount: 0, consecutiveStone: 0, noWaterCount: 0, waterHistory: [], wastePile: {sun:0,stone:0,water:0,cheer:0}, debt: 0, consecutiveNoProgress: 0 },
        p2: { progress: 0, temp: 5, stoneCount: 0, cheerCount: 0, consecutiveStone: 0, noWaterCount: 0, waterHistory: [], wastePile: {sun:0,stone:0,water:0,cheer:0}, debt: 0, consecutiveNoProgress: 0 }
    };

    window.onload = function() {
        const savedUser = localStorage.getItem('marathon_user');
        const savedToken = localStorage.getItem('marathon_token');
        const savedMode = localStorage.getItem('marathon_mode');

        if (savedUser && savedToken) {
            myUsername = savedUser;
            document.getElementById('room-username').innerText = savedUser;
            setupSocketConnection();
            socket.emit('login', { username: savedUser, token: savedToken });
        } else {
            alert("プラットフォームの認証情報がありません。ロビーに戻ります。");
            backToPlatformLobby();
        }
    };

    function setupSocketConnection() {
        if (socket) return;
        socket = io();

        socket.on('connect', () => {
            const savedUser = localStorage.getItem('marathon_user');
            const savedToken = localStorage.getItem('marathon_token');
            if (savedUser && savedToken) {
                socket.emit('login', { username: savedUser, token: savedToken });
            }
        });

        socket.on('login_res', (res) => {
            if (res.success) {
                writeLog(`【システム】大枠プラットフォーム回線の同期に成功。`);
            }
        });

        socket.on('matchmaking_started', () => {
            isMatching = true;
            document.getElementById('lobby-panel').classList.add('hidden');
            document.getElementById('matching-panel').classList.remove('hidden');
            matchSeconds = 0;
            matchTimerInterval = setInterval(() => {
                matchSeconds++;
                document.getElementById('matching-timer').innerText = `経過時間: ${matchSeconds}秒`;
            }, 1000);
        });

        socket.on('matchmaking_stopped', () => {
            isMatching = false;
            clearInterval(matchTimerInterval);
            document.getElementById('matching-panel').classList.add('hidden');
            document.getElementById('lobby-panel').classList.remove('hidden');
        });

        // 🌟 大枠システムの「最初から実名オープン仕様」を受け取るトリガー
        socket.on('platform_match_found', (data) => {
            if(data.gameId !== 'marathon') return; // 他のゲームの通知ならスルー
            
            isMatching = false;
            clearInterval(matchTimerInterval);
            document.getElementById('matching-panel').classList.add('hidden');
            document.getElementById('game-area').style.display = 'block';

            // 最初から実名とレートを画面に完全マージ
            document.getElementById('p1-name-card').innerText = data.p1.username;
            document.getElementById('p1-rate-card').innerText = `[${data.p1.rate}pt]`;
            document.getElementById('p2-name-card').innerText = data.p2.username;
            document.getElementById('p2-rate-card').innerText = `[${data.p2.rate}pt]`;

            unlockScreen(); setupHandAndBoxes(); startTimer(300);
        });

        socket.on('assigned_player', (num) => {
            myPlayerNumber = num;
        });

        socket.on('opponent_moving_card', (data) => {
            document.querySelectorAll('.opponent-row .mystery-card').forEach(c => c.remove());
            if (data.targetZone && data.targetZone !== 'hand') {
                const targetSlot = document.getElementById(`slot-opp-${data.targetZone}`);
                if (targetSlot) {
                    const mysteryCard = document.createElement('div');
                    mysteryCard.className = 'card mystery-card'; mysteryCard.innerText = '?';
                    targetSlot.appendChild(mysteryCard);
                }
            }
        });

        socket.on('receive_chat', (msg) => { writeLog(msg); });

        socket.on('round_result', (data) => {
            let oppChoice = myPlayerNumber === 1 ? data.p2ChoiceRaw : data.p1ChoiceRaw;
            revealOpponentCards(oppChoice);

            if(data.activeEvent) {
                let targetCutinId = (data.eventSender === myPlayerNumber) ? 'cutin-my-field' : 'cutin-opp-field';
                triggerFieldCutin(targetCutinId, data.activeEvent);
            }

            setTimeout(() => {
                document.getElementById('turn-count').innerText = data.nextTurn;
                document.getElementById('runner-p1').style.left = Math.min((data.p1Progress / 10), 85) + "%";
                document.getElementById('runner-p2').style.left = Math.min((data.p2Progress / 10), 85) + "%";

                updateLaneColor('lane-p1', data.p1Temp);
                updateLaneColor('lane-p2', data.p2Temp);
                updateDebtBadge('debt-p1', data.p1Debt);
                updateDebtBadge('debt-p2', data.p2Debt);

                writeLog(data.resultLog);

                document.getElementById('event-panel').style.display = (myPlayerNumber === 1 ? data.p1CanEvent : data.p2CanEvent) ? 'block' : 'none';

                localKeep = data.keeps[myPlayerNumber === 1 ? 'p1' : 'p2'];
                eventReserved = false;
                document.getElementById('evt-btn').disabled = false;
                document.getElementById('evt-btn').innerText = "このターンにイベントを発動する";

                unlockScreen(); setupHandAndBoxes(); startTimer(300);
            }, 2500); 
        });

        // 🌟 プラットフォーム共通レート窓口からのゲームオーバーリザルト受信
        socket.on('platform_game_over', (result) => {
            clearInterval(timerInterval); lockScreen();
            let msg = (result.winner === myUsername) ? `【大勝利】共通レート変動: +${result.rateChange} pt` : `【敗北】共通レート変動: -${result.rateChange} pt`;
            if (result.winner === 'DRAW') msg = "【引き分け】同時不動ドローです。";
            
            alert(`${msg}\n最新レート: ${result.newRate} pt (${result.newRank})`);
            clearAllBackup();
            location.href = '/'; // ポータル画面ロビーへ凱旋帰還
        });
    }

    function toggleMatchmaking() {
        if (!isMatching) {
            socket.emit('join_matchmaking', { gameId: 'marathon' }); // 大枠システムへIDを添えて申請
        } else {
            socket.emit('leave_matchmaking');
        }
    }

    function submitOnlineTurn() {
        if(isLocked) return;
        clearInterval(timerInterval);
        
        const getCards = (slotId) => {
            const slot = document.getElementById(slotId);
            return Array.from(slot.children).filter(el => el.classList.contains('card')).map(c => c.dataset.type);
        };

        const choice = {
            self: getCards('slot-my-self'), target: getCards('slot-my-target'), waste: getCards('slot-my-waste'), keep: getCards('slot-my-keep'),
            hand: Array.from(document.getElementById('zone-hand').children).map(c => c.dataset.type)
        };

        if (choice.hand.length > 0) {
            alert("手札枠に残っているカードがあります！");
            startTimer(timerSeconds); return;
        }

        lockScreen();

        if (isAIMode) {
            setTimeout(() => { executeAILogic(choice); }, 500);
        } else {
            document.getElementById('submit-btn').innerText = "相手の入力を待っています...";
            // 大枠の交通整理仕様に完全に沿ってデータを送信
            socket.emit('submit_turn', { player: myPlayerNumber, choice: choice });
        }
    }

    function declareEvent() {
        eventReserved = true;
        document.getElementById('evt-btn').disabled = true;
        document.getElementById('evt-btn').innerText = "イベント発動予約済み";
        if (!isAIMode) { socket.emit('reserve_event', { player: myPlayerNumber }); }
    }

    function notifyCardMove(slotId) {
        if(isLocked || isAIMode || !socket) return;
        let zoneName = slotId.replace('slot-my-', '');
        socket.emit('player_move_card', { targetZone: zoneName });
    }

    function sendChat() { 
        const input = document.getElementById('chat-input'); 
        if(!input.value.trim() || isAIMode || !socket) return; 
        socket.emit('send_chat', `${myUsername}: ${input.value}`); 
        input.value = ''; 
    }

    // --- 各種UI演出・カード操作・ローカルAIエンジン（省略なし） ---
    function setupHandAndBoxes() {
        const handZone = document.getElementById('zone-hand');
        document.querySelectorAll('#my-field-row .card-slot').forEach(slot => {
            const label = slot.querySelector('.slot-label');
            slot.innerHTML = ''; if(label) slot.appendChild(label);
        });
        document.querySelectorAll('.opponent-row .opened-opp-card').forEach(c => c.remove());
        handZone.innerHTML = '';

        const types = ['sun', 'stone', 'water', 'cheer'];
        const labels = { sun: '太陽', stone: '石', water: '水', cheer: '応援' };

        types.forEach(type => {
            const card = document.createElement('div');
            card.className = 'card'; card.draggable = true; card.dataset.type = type;
            card.id = `card-${type}-${Math.floor(Math.random() * 100000)}`;
            card.innerText = labels[type];
            if (localKeep.includes(type)) { document.getElementById('slot-my-keep').appendChild(card); }
            else { handZone.appendChild(card); }
        });

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                if(isLocked) { e.preventDefault(); return; }
                e.dataTransfer.setData('text/plain', e.target.id);
            });
            card.onclick = () => {
                if(isLocked) return;
                const slotIds = ['zone-hand', 'slot-my-self', 'slot-my-target', 'slot-my-waste', 'slot-my-keep'];
                let currentZoneId = card.parentElement.id === 'zone-hand' ? 'zone-hand' : card.parentElement.id;
                let nextIdx = (slotIds.indexOf(currentZoneId) + 1) % slotIds.length;
                if (slotIds[nextIdx] === 'slot-my-keep' && !canAddToKeep(card.id, 'slot-my-keep')) nextIdx = 0;
                const nextZoneEl = document.getElementById(slotIds[nextIdx]);
                nextZoneEl.appendChild(card); notifyCardMove(nextZoneEl.id);
            };
        });
    }

    document.querySelectorAll('.card-slot, #zone-hand').forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        zone.addEventListener('drop', (e) => {
            e.preventDefault(); if(isLocked) return;
            const id = e.dataTransfer.getData('text/plain');
            if(zone.id.startsWith('slot-my-') || zone.id === 'zone-hand') {
                if (!canAddToKeep(id, zone.id)) return;
                const dragged = document.getElementById(id);
                if (dragged) { zone.appendChild(dragged); notifyCardMove(zone.id); }
            }
        });
    });

    function canAddToKeep(cardId, targetSlotId) {
        if (targetSlotId !== 'slot-my-keep') return true;
        const keepSlot = document.getElementById('slot-my-keep');
        const hasCard = Array.from(keepSlot.children).some(el => el.classList.contains('card'));
        if (hasCard) { alert("保留枠には最大1枚しか置けません！"); return false; }
        return true;
    }

    function startTimer(seconds) {
        clearInterval(timerInterval); timerSeconds = seconds; updateTimerDisplay();
        timerInterval = setInterval(() => {
            timerSeconds--; updateTimerDisplay();
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                if (isAIMode) { lockScreen(); clearAllBackup(); alert("遅延失格！"); }
                else { socket.emit('player_timeout', { player: myPlayerNumber }); }
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const min = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        const sec = String(timerSeconds % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `${min}:${sec}`;
    }

    function revealOpponentCards(oppChoice) {
        document.querySelectorAll('.opponent-row .card, .opponent-row .mystery-card').forEach(c => c.remove());
        const labels = { sun: '太陽', stone: '石', water: '水', cheer: '応援' };
        for (let key in oppChoice) {
            if(key === 'hand') continue;
            const slot = document.getElementById(`slot-opp-${key}`);
            if(slot) {
                oppChoice[key].forEach(type => {
                    const card = document.createElement('div');
                    card.className = 'card opened-opp-card'; card.dataset.type = type; card.innerText = labels[type];
                    slot.appendChild(card);
                });
            }
        }
    }

    function triggerFieldCutin(elementId, evtInfo) {
        const board = document.getElementById(elementId);
        board.innerText = evtInfo.title; board.style.background = evtInfo.color; board.style.display = 'flex';
        setTimeout(() => { board.style.display = 'none'; }, 2200);
    }

    function updateDebtBadge(badgeId, debtValue) {
        const badge = document.getElementById(badgeId);
        if(debtValue > 0) { badge.innerText = `壁: -${debtValue}%`; badge.style.display = 'inline-block'; }
        else { badge.style.display = 'none'; }
    }

    function updateLaneColor(laneId, temp) {
        const laneEl = document.getElementById(laneId);
        if (temp < 5) laneEl.style.backgroundColor = "#4a69bd";
        else if (temp === 5) laneEl.style.backgroundColor = "#2e2e2e";
        else if (temp >= 6 && temp <= 9) laneEl.style.backgroundColor = "#f1c40f";
        else if (temp >= 10 && temp <= 14) laneEl.style.backgroundColor = "#e67e22";
        else laneEl.style.backgroundColor = `rgb(${Math.min(150, 70 + (temp - 15) * 15)}, 15, 15)`;
    }

    function writeLog(msg) {
        const logs = document.getElementById('chat-logs');
        logs.innerHTML += `\n${msg}`; logs.scrollTop = logs.scrollHeight;
    }

    function lockScreen() { isLocked = true; document.getElementById('lock-overlay').style.display = 'block'; document.getElementById('submit-btn').disabled = true; }
    function unlockScreen() { isLocked = false; document.getElementById('lock-overlay').style.display = 'none'; document.getElementById('submit-btn').disabled = false; document.getElementById('submit-btn').innerText = "配置を確定する"; }
    
    function startAIModeTrigger() {
        isAIMode = true;
        document.getElementById('lobby-panel').classList.add('hidden');
        document.getElementById('game-area').style.display = 'block';
        writeLog("【システム】AI対戦開始。目標1000%！");
        unlockScreen(); setupHandAndBoxes(); startTimer(300);
    }

    function executeAILogic(p1Choice) {
        let aiChoice = { self: [], target: [], waste: [], keep: [] };
        let types = ['sun', 'stone', 'water', 'cheer'];
        let available = types.filter(t => !localKeep.includes(t)); 
        if (Math.random() < 0.25 && available.length > 0) { aiChoice.keep.push(available.pop()); }
        while(available.length > 0) {
            let c = available.pop(); let r = Math.random();
            if(r < 0.35) aiChoice.self.push(c); else if(r < 0.7) aiChoice.target.push(c); else aiChoice.waste.push(c);
        }
        revealOpponentCards(aiChoice);
        setTimeout(() => {
            p1Choice.waste.forEach(t => aiState.p1.wastePile[t]++);
            aiChoice.waste.forEach(t => aiState.p2.wastePile[t]++);
            if (aiState.turn >= 15 && (aiState.turn - aiState.lastEventP2 >= 10)) { if (Math.random() > 0.6) aiState.p2Reserved = true; }
            if (eventReserved) aiState.p1Reserved = true;
            let evText = "";
            if (aiState.p1Reserved) {
                let pData = aiState.p1; let maxType = 'cheer'; let maxCount = -1;
                for(let t in pData.wastePile) { if(pData.wastePile[t] > maxCount) { maxCount = pData.wastePile[t]; maxType = t; } }
                if(maxType === 'water') { pData.temp -= maxCount; evText += `★あなた：【天の涙】温度が ${maxCount}℃ 下がった！\n`; }
                else if(maxType === 'stone') { pData.debt += maxCount; evText += `★あなた：【避けられぬ現実】自分に ${maxCount}% の壁が出現！\n`; }
                else if(maxType === 'sun') { pData.temp += maxCount; evText += `★あなた：【地獄の炎のおでむかえ】温度が ${maxCount}℃ 上がった！\n`; }
                else if(maxType === 'cheer') { pData.progress += (maxCount * 4); evText += `★あなた：【大応援】 ${maxCount * 4}% 前進！\n`; }
                pData.wastePile[maxType] = 0; aiState.lastEventP1 = aiState.turn; aiState.p1Reserved = false;
            }
            if (aiState.p2Reserved) {
                let pData = aiState.p2; let maxType = 'cheer'; let maxCount = -1;
                for(let t in pData.wastePile) { if(pData.wastePile[t] > maxCount) { maxCount = pData.wastePile[t]; maxType = t; } }
                if(maxType === 'water') { pData.temp -= maxCount; evText += `★AI：【天の涙】温度が ${maxCount}℃ 下がった！\n`; }
                else if(maxType === 'stone') { pData.debt += maxCount; evText += `★AI：【避けられぬ現実】自分に ${maxCount}% の壁が出現！\n`; }
                else if(maxType === 'sun') { pData.temp += maxCount; evText += `★AI：【地獄 of 炎】温度が ${maxCount}℃ 上がった！\n`; }
                else if(maxType === 'cheer') { pData.progress += (maxCount * 4); evText += `★AI：【大応援】 ${maxCount * 4}% 前進！\n`; }
                pData.wastePile[maxType] = 0; aiState.lastEventP2 = aiState.turn; aiState.p2Reserved = false;
            }
            let s = aiState;
            let p1Sun = p1Choice.self.includes('sun') || aiChoice.target.includes('sun');
            let p2Sun = aiChoice.self.includes('sun') || p1Choice.target.includes('sun');
            if (p1Sun) s.p1.temp++; if (p2Sun) s.p2.temp++;
            if (p1Choice.self.includes('cheer')) s.p1.cheerCount++; if (aiChoice.target.includes('cheer')) s.p1.cheerCount++;
            if (aiChoice.self.includes('cheer')) s.p2.cheerCount++; if (p1Choice.target.includes('cheer')) s.p2.cheerCount++;

            let p1Spd = 5; if (s.p1.temp < 5) p1Spd = Math.max(0, 5 - (5 - s.p1.temp)); else if (s.p1.temp >= 6 && s.p1.temp <= 10) p1Spd = 7; else if (s.p1.temp >= 10 && s.p1.temp <= 15) p1Spd = 10; else if (s.p1.temp >= 15 && s.p1.temp <= 20) p1Spd = Math.max(5, 10 - (s.p1.temp - 15)); else if (s.p1.temp >= 20) p1Spd = Math.max(0, 5 - (s.p1.temp - 20));
            if (p1Choice.self.includes('cheer')) p1Spd += 1; if (aiChoice.target.includes('cheer')) p1Spd += 1;
            let p1StoneNum = (p1Choice.self.includes('stone')?1:0) + (aiChoice.target.includes('stone')?1:0);
            s.p1.stoneCount += p1StoneNum; s.p1.consecutiveStone = p1StoneNum > 0 ? s.p1.consecutiveStone + 1 : 0;
            if (p1StoneNum > 0) p1Spd -= 1;
            let p1WaterNum = (p1Choice.self.includes('water')?1:0) + (aiChoice.target.includes('water')?1:0);
            s.p1.noWaterCount = p1WaterNum === 0 ? s.p1.noWaterCount + 1 : 0;

            let p2Spd = 5; if (s.p2.temp < 5) p2Spd = Math.max(0, 5 - (5 - s.p2.temp)); else if (s.p2.temp >= 6 && s.p2.temp <= 10) p2Spd = 7; else if (s.p2.temp >= 10 && s.p2.temp <= 15) p2Spd = 10; else if (s.p2.temp >= 15 && s.p2.temp <= 20) p2Spd = Math.max(5, 10 - (s.p2.temp - 15)); else if (s.p2.temp >= 20) p2Spd = Math.max(0, 5 - (s.p2.temp - 20));
            if (aiChoice.self.includes('cheer')) p2Spd += 1; if (p1Choice.target.includes('cheer')) p2Spd += 1;
            let p2StoneNum = (aiChoice.self.includes('stone')?1:0) + (p1Choice.target.includes('stone')?1:0);
            s.p2.stoneCount += p2StoneNum; s.p2.consecutiveStone = p2StoneNum > 0 ? s.p2.consecutiveStone + 1 : 0;
            if (p2StoneNum > 0) p2Spd -= 1;

            if(p1Spd < 0) { s.p1.debt += Math.abs(p1Spd); p1Spd = 0; }
            else if(s.p1.debt > 0) { if(p1Spd >= s.p1.debt) { p1Spd -= s.p1.debt; s.p1.debt = 0; } else { s.p1.debt -= p1Spd; p1Spd = 0; } }
            if(p2Spd < 0) { s.p2.debt += Math.abs(p2Spd); p2Spd = 0; }
            else if(s.p2.debt > 0) { if(p2Spd >= s.p2.debt) { p2Spd -= s.p2.debt; s.p2.debt = 0; } else { s.p2.debt -= p2Spd; p2Spd = 0; } }

            s.p1.progress += p1Spd; s.p2.progress += p2Spd;
            writeLog(`【第 ${s.turn} ターン】あなた: ${s.p1.progress}% / AI: ${s.p2.progress}%`);

            document.getElementById('turn-count').innerText = ++s.turn;
            document.getElementById('runner-p1').style.left = Math.min((s.p1.progress / 10), 85) + "%";
            document.getElementById('runner-p2').style.left = Math.min((s.p2.progress / 10), 85) + "%";
            updateLaneColor('lane-p1', s.p1.temp); updateLaneColor('lane-p2', s.p2.temp);
            updateDebtBadge('debt-p1', s.p1.debt); updateDebtBadge('debt-p2', s.p2.debt);

            if(s.p1.progress >= 1000 || s.p2.progress >= 1000) { alert(s.p1.progress >= s.p2.progress ? "勝利！" : "敗北！"); location.href = '/'; return; }
            eventReserved = false; document.getElementById('evt-btn').disabled = false; unlockScreen(); setupHandAndBoxes(); startTimer(300);
        }, 2500);
    }

    function backToPlatformLobby() { clearAllBackup(); location.href = '/'; }
    function clearAllBackup() { localStorage.removeItem('marathon_mode'); }
</script>
