<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE MARATHON - 完全公式レート版</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- 共通の超美麗ダークテーマスタイル --- */
        body { font-family: 'Arial', sans-serif; background: #121212; color: #ffffff; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 800px; margin: 40px auto; background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #2d2d2d; }
        h1 { color: #ff4757; font-size: 2.8em; margin-bottom: 5px; text-shadow: 0 0 10px rgba(2ff,71,87,0.3); }
        .subtitle { font-size: 1em; color: #888; margin-bottom: 35px; letter-spacing: 2px; }
        
        input { width: 85%; padding: 15px; margin: 12px 0; border: 1px solid #333; border-radius: 8px; background: #252525; color: #fff; font-size: 1.1em; transition: 0.3s; }
        input:focus { border-color: #ff4757; outline: none; box-shadow: 0 0 8px rgba(2ff,71,87,0.5); }
        
        button { width: 90%; padding: 15px; margin: 12px 0; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: #ff4757; color: white; box-shadow: 0 4px 15px rgba(2ff,71,87,0.4); }
        .btn-primary:hover { background: #ff6b81; transform: translateY(-2px); }
        .btn-secondary { background: #2ed573; color: white; box-shadow: 0 4px 15px rgba(46,213,115,0.4); }
        .btn-secondary:hover { background: #26af5f; transform: translateY(-2px); }
        .btn-guest { background: #747d8c; color: white; }
        .btn-guest:hover { background: #57606f; transform: translateY(-2px); }
        .btn-danger { background: #ff6b81; color: white; width: auto; padding: 10px 20px; font-size: 0.9em; }

        .hidden { display: none !important; }
        hr { border: 0; height: 1px; background: #333; margin: 30px 0; }
        
        /* ランクバッジ設計 */
        .badge { padding: 5px 12px; border-radius: 5px; font-weight: bold; font-size: 0.85em; margin-left: 8px; vertical-align: middle; letter-spacing: 1px; }
        .rank-NORMAL { background: #747d8c; color: #fff; }
        .rank-ELITE { background: #2ed573; color: #fff; box-shadow: 0 0 10px rgba(46,213,115,0.4); }
        .rank-PREMIUM { background: #1e90ff; color: #fff; box-shadow: 0 0 10px rgba(30,144,255,0.4); }
        .rank-VIP { background: #ffa500; color: #fff; box-shadow: 0 0 15px rgba(255,165,0,0.6); animation: vipPulse 2s infinite; }
        .rank-GUEST { background: #a4b0be; color: #2f3542; }

        @keyframes vipPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,165,0,0.9); } 100% { transform: scale(1); } }

        /* 管理者テーブル */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: #1a1a1a; text-align: left; border-radius: 8px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 14px; border-bottom: 1px solid #2d2d2d; font-size: 0.95em; }
        .admin-table th { background: #ff4757; color: white; font-weight: bold; }
        .admin-table tr:hover { background: #252525; }

        /* --- ゲーム本編（実戦画面）のレイアウト --- */
        #game-screen { padding: 10px; width: 100vw; height: 100vh; box-sizing: border-box; background: #0b0b0b; position: fixed; top: 0; left: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        #game-header { width: 95%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #1e1e1e; padding: 10px 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        .player-info-box { font-size: 1.1em; font-weight: bold; display: flex; align-items: center; }
        #turn-display { font-size: 1.5em; font-weight: bold; color: #ffa500; }
        
        #marathon-canvas { background: #151515; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); margin-bottom: 15px; }
        
        /* 手札・操作UI */
        #control-panel { width: 95%; background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #2d2d2d; display: flex; flex-direction: column; align-items: center; }
        #hand-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; width: 100%; height: 120px; }
        .card { width: 80px; height: 110px; background: #2f3542; border: 2px solid #57606f; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; transition: 0.2s; position: relative; box-sizing: border-box; padding: 5px; font-size: 0.85em; text-align: center; }
        .card:hover { transform: translateY(-10px) scale(1.05); border-color: #ff4757; box-shadow: 0 5px 15px rgba(2ff,71,87,0.4); }
        .card.selected { border-color: #2ed573; background: #1e3726; box-shadow: 0 0 15px rgba(46,213,115,0.6); }
        
        /* カード種別ごとの色分け定義（裏ルール用） */
        .card-type-stone { background: #747d8c; color: #fff; }
        .card-type-sun { background: #ff4757; color: #fff; }
        .card-type-water { background: #1e90ff; color: #fff; }
        .card-type-cheer { background: #ffa500; color: #fff; }

        #action-buttons { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .act-btn { width: 200px; padding: 12px; font-size: 1em; }
        
        /* 状況オーバーレイ表示 */
        #status-overlay { font-size: 1.3em; color: #2ed573; font-weight: bold; margin-top: 5px; height: 30px; }
    </style>
</head>
<body>

<div id="auth-screen" class="container">
    <h1>THE MARATHON</h1>
    <div class="subtitle">〜走者よ、己が試練を設置し、泥濘の頂点へ進め〜</div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="username" placeholder="ユーザー名（重複不可の固有識別名）">
        <input type="password" id="password" placeholder="認証パスワード">
    </div>
    
    <button class="btn-primary" onclick="login()">公式サーバーへログイン</button>
    <button class="btn-secondary" onclick="register()">新規走者アカウントを開拓する</button>
    
    <hr>
    
    <button class="btn-guest" onclick="loginGuest()">友達に走らせる（ゲストモード・レート変動なし）</button>
</div>

<div id="lobby-screen" class="container hidden">
    <h2>極限回廊ロビー</h2>
    <div style="background: #252525; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333;">
        <span style="font-size: 1.3em;">現役走者: <span id="display-name" style="color:#2ed573; font-weight:bold;"></span></span>
        <span id="display-rank" class="badge"></span>
        <div style="margin-top: 15px; font-size: 1.5em;">
            公式最高評価レート: <span id="display-rate" style="color:#ff4757; font-weight:bold;"></span> pt
        </div>
    </div>

    <button class="btn-primary" id="match-btn" onclick="toggleMatchmaking()" style="font-size: 1.3em; padding: 20px;">公式レートマッチングを開始</button>
    <button class="btn-guest" onclick="startAIGame()">思考AI擬似戦（練習・データ変動なし）</button>
    
    <hr>
    <button class="btn-danger" onclick="logout()">走者アカウントをログアウト</button>
</div>

<div id="matching-screen" class="container hidden">
    <div style="padding: 30px;">
        <div style="width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #ff4757; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite;"></div>
        <h2 style="color: #ffa500; margin-bottom: 10px;">空間同調中（マッチング探索）</h2>
        <p id="matching-timer" style="font-size: 1.4em; font-weight: bold; color: #fff;">経過時間: 0秒</p>
        
        <div id="search-status" style="margin-top: 20px; color: #aaa; font-size: 0.95em; line-height: 1.6;">
            [システム状況]: <span id="search-phase" style="color:#ff6b81; font-weight:bold;">同階層レーティング制限検索中</span>
        </div>
        
        <button class="btn-guest" onclick="toggleMatchmaking()" style="margin-top: 40px; width: 60%;">探索を中断してロビーに戻る</button>
    </div>
</div>

<div id="admin-screen" class="container hidden">
    <h2 style="color: #2ed573; margin-bottom: 5px;">🛡️ 中央管理者統治パネル</h2>
    <p style="color: #888; font-size: 0.9em; margin-bottom: 25px;">全登録走者の戦闘履歴、暗号データの完全リアルタイム監視</p>
    
    <table class="admin-table">
        <thead>
            <tr>
                <th>走者識別名</th>
                <th>公式判定レート</th>
                <th>ピラミッド階層</th>
                <th>累積勝利</th>
                <th>累積敗北</th>
                <th>最終遭遇者</th>
            </tr>
        </thead>
        <tbody id="admin-data-rows">
            </tbody>
    </table>
    
    <button class="btn-guest" style="margin-top: 30px; background: #ff4757;" onclick="logout()">統治権限を返上（ログアウト）</button>
</div>

<div id="game-screen" class="hidden">
    <div id="game-header">
        <div class="player-info-box">
            <span id="p1-name-display">YOU</span>
            <span id="p1-rate-display" style="color: #ff4757; margin-left: 10px;"></span>
        </div>
        <div id="turn-display">TURN 1</div>
        <div class="player-info-box">
            <span id="p2-name-display">ENEMY</span>
            <span id="p2-rate-display" style="color: #ff4757; margin-left: 10px;"></span>
        </div>
    </div>

    <canvas id="marathon-canvas" width="750" height="400"></canvas>
    
    <div id="status-overlay">あなたの戦術（カード選択）を待機中...</div>

    <div id="control-panel">
        <div id="hand-container">
            </div>
        <div id="action-buttons">
            <button class="btn-secondary act-btn" onclick="executeCardAction('PLAY')">選択カードを設置</button>
            <button class="btn-guest act-btn" style="background:#57606f;" onclick="executeCardAction('DISCARD')">選択カードを廃棄</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    
    // アプリケーション内部状態管理
    let myUsername = null;
    let myCurrentRate = null;
    let myCurrentRank = null;
    let isMatching = false;
    let matchTimerInterval = null;
    let matchSeconds = 0;
    
    let activeRoomId = null;
    let selectedCardIndex = null;
    let currentHandData = [];

    // Canvas レンダリング環境
    const canvas = document.getElementById('marathon-canvas');
    const ctx = canvas.getContext('2d');

    // スピナーアニメーション用
    const styleSheet = document.styleSheets[0];
    styleSheet.insertRule(`@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`, styleSheet.cssRules.length);

    // =================================================================
    // 【命綱】ページロード時の自動ログイン再認証処理
    // =================================================================
    window.onload = () => {
        const savedUser = localStorage.getItem('marathon_user');
        const savedToken = localStorage.getItem('marathon_token');
        if (savedUser && savedToken) {
            socket.emit('login', { username: savedUser, token: savedToken });
        }
    };

    // =================================================================
    // 認証系リクエストハンドラー
    // =================================================================
    function register() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("走者名および暗号パスワードを入力してください。");
        socket.emit('register', { username: u, password: p });
    }

    function login() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p) return alert("走者名および暗号パスワードを入力してください。");
        socket.emit('login', { username: u, password: p });
    }

    function loginGuest() {
        socket.emit('login_guest');
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // =================================================================
    // サーバーレスポンス転送受信（Socketイベント群）
    // =================================================================
    socket.on('register_res', (res) => {
        alert(res.msg);
    });

    socket.on('login_res', (res) => {
        if (res.success) {
            myUsername = res.username;
            myCurrentRate = res.rate;
            myCurrentRank = res.rank;

            // ローカルストレージに命綱用トークンを記録
            if (!res.isGuest && res.username !== 'admin') {
                localStorage.setItem('marathon_user', res.username);
                // パスワード入力値、または既存保持トークンをサルベージして固定
                const pInput = document.getElementById('password').value.trim();
                if(pInput) localStorage.setItem('marathon_token', pInput);
            }

            document.getElementById('auth-screen').classList.add('hidden');
            
            if (res.isAdmin) {
                // 管理者専用画面展開
                document.getElementById('admin-screen').classList.remove('hidden');
                socket.emit('get_admin_data');
            } else {
                // 一般・ゲストロビー展開
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = res.username;
                document.getElementById('display-rate').innerText = res.rate;
                
                const rankBadge = document.getElementById('display-rank');
                rankBadge.innerText = res.rank;
                rankBadge.className = `badge rank-${res.rank}`;
            }
        } else {
            alert(res.msg);
        }
    });

    // 管理者用生データ同期レンダリング
    socket.on('admin_data_res', (players) => {
        const tbody = document.getElementById('admin-data-rows');
        tbody.innerHTML = "";
        for (let name in players) {
            if(name === 'admin') continue;
            let p = players[name];
            let row = `<tr>
                <td style="font-weight:bold; color:#fff;">${name}</td>
                <td style="color:#ff4757; font-weight:bold;">${p.rate} pt</td>
                <td><span class="badge rank-${p.rank}">${p.rank}</span></td>
                <td style="color:#2ed573;">${p.win} 勝</td>
                <td style="color:#ff6b81;">${p.lose} 敗</td>
                <td style="color:#888;">${p.lastPlayedWith || '未遭遇'}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
    });

    // =================================================================
    // マッチングロジック制御（段階的緩和フェーズ同期）
    // =================================================================
    function toggleMatchmaking() {
        if (!isMatching) {
            socket.emit('join_matchmaking');
        } else {
            socket.emit('leave_matchmaking');
        }
    }

    socket.on('matchmaking_started', () => {
        isMatching = true;
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('matching-screen').classList.remove('hidden');
        matchSeconds = 0;
        document.getElementById('matching-timer').innerText = `経過時間: 0秒`;
        document.getElementById('search-phase').innerText = "同階層レーティング制限検索中";
        document.getElementById('search-phase').style.color = "#ff4757";

        matchTimerInterval = setInterval(() => {
            matchSeconds++;
            document.getElementById('matching-timer').innerText = `経過時間: ${matchSeconds}秒`;
            
            // 段階的マッチングの検索フェーズ（視覚化UI）
            if (matchSeconds >= 15 && matchSeconds < 30) {
                document.getElementById('search-phase').innerText = "周辺階層レーティング緩和検索中";
                document.getElementById('search-phase').style.color = "#ffa500";
            } else if (matchSeconds >= 30) {
                document.getElementById('search-phase').innerText = "全階層無制限マッチング検索中";
                document.getElementById('search-phase').style.color = "#2ed573";
            }
        }, 1000);
    });

    socket.on('matchmaking_stopped', () => {
        isMatching = false;
        clearInterval(matchTimerInterval);
        document.getElementById('matching-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    });

    // =================================================================
    // ゲーム実践フェーズ ＆ スナイプ隠蔽対応
    // =================================================================
    socket.on('match_found', (data) => {
        isMatching = false;
        clearInterval(matchTimerInterval);
        activeRoomId = data.roomId;
        
        // 画面切り替え
        document.getElementById('matching-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        // スナイプ防御対応：isHiddenが真なら情報を一時的にマスク
        if (data.p1.isHidden) {
            document.getElementById('p1-name-display').innerText = "走者選択中...";
            document.getElementById('p1-rate-display').innerText = "[Rate: ????]";
        } else {
            document.getElementById('p1-name-display').innerText = data.p1.username;
            document.getElementById('p1-rate-display').innerText = `[${data.p1.rate}pt]`;
        }

        if (data.p2.isHidden) {
            document.getElementById('p2-name-display').innerText = "対峙走者潜伏中...";
            document.getElementById('p2-rate-display').innerText = "[Rate: ????]";
        } else {
            document.getElementById('p2-name-display').innerText = data.p2.username;
            document.getElementById('p2-rate-display').innerText = `[${data.p2.rate}pt]`;
        }

        // 初期描画トリガー
        initGameBoard();
    });

    // 【命綱】サーバーから再接続が承認された場合
    socket.on('reconnect_success', (data) => {
        activeRoomId = data.roomId;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('matching-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        // 最新のゲーム状態を画面に復元
        updateGameState(data.gameState);
    });

    // =================================================================
    // ゲームボード描画 ＆ 手札レンダリングシステム
    // =================================================================
    function initGameBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 背景・スタート・ゴールのグリッド初期化描画
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // レーン境界線
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();

        // テキスト表示
        ctx.fillStyle = "#888";
        ctx.font = "14px Arial";
        ctx.fillText("START (0%)", 10, 30);
        ctx.fillText("GOAL (1000%)", canvas.width - 100, 30);
    }

    // サーバーから毎ターン送られてくるゲーム状況の完全同期
    socket.on('game_update', (gameState) => {
        updateGameState(gameState);
    });

    function updateGameState(state) {
        document.getElementById('turn-display').innerText = `TURN ${state.turn}`;
        
        // スナイプ解除フェーズ（1ターン目の処理が始まればマスク解除）
        if (state.revealPlayers) {
            document.getElementById('p1-name-display').innerText = state.p1.username;
            document.getElementById('p1-rate-display').innerText = `[${state.p1.rate}pt]`;
            document.getElementById('p2-name-display').innerText = state.p2.username;
            document.getElementById('p2-rate-display').innerText = `[${state.p2.rate}pt]`;
        }

        // Canvas 走破描写更新
        ctx.fillStyle = "#151515";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 中間レーン境界
        ctx.strokeStyle = "#333";
        ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(750, 200); ctx.stroke();

        // 走者1（YOU側）のコマ
        let p1X = (state.p1.progress / 1000) * (canvas.width - 60) + 30;
        ctx.fillStyle = "#ff4757";
        ctx.beginPath(); ctx.arc(p1X, 100, 20, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.fillText("YOU", p1X - 12, 104);

        // 走者2（ENEMY側）のコマ
        let p2X = (state.p2.progress / 1000) * (canvas.width - 60) + 30;
        ctx.fillStyle = "#1e90ff";
        ctx.beginPath(); ctx.arc(p2X, 300, 20, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.fillText("ENEMY", p2X - 20, 304);

        // 自分に該当する手札データの抽出・描画
        let myData = (state.p1.username === myUsername) ? state.p1 : state.p2;
        renderHand(myData.hand);
    }

    function renderHand(hand) {
        currentHandData = hand;
        const container = document.getElementById('hand-container');
        container.innerHTML = "";
        selectedCardIndex = null;

        hand.forEach((card, index) => {
            const cardEl = document.createElement('div');
            // 裏ルール準拠のカード種別カラークラスを適用
            cardEl.className = `card card-type-${card.type}`;
            cardEl.innerText = `${card.name}\n[${card.value}]`;
            
            cardEl.onclick = () => {
                // 手札選択切り替え
                const cards = document.querySelectorAll('.card');
                cards.forEach(c => c.classList.remove('selected'));
                cardEl.classList.add('selected');
                selectedCardIndex = index;
                document.getElementById('status-overlay').innerText = `作戦決定: 「${card.name}」を選択中...`;
            };

            container.appendChild(cardEl);
        });
    }

    // カードの「設置」または「廃棄」アクションをサーバーへパケット送信
    function executeCardAction(actionType) {
        if (selectedCardIndex === null) {
            alert("戦術を展開するカードを手札から選択してください。");
            return;
        }
        
        document.getElementById('status-overlay').innerText = "サーバーの深層判定へ思考を送信中...";
        
        socket.emit('player_action', {
            roomId: activeRoomId,
            username: myUsername,
            cardIndex: selectedCardIndex,
            action: actionType // 'PLAY'（設置） または 'DISCARD'（廃棄）
        });
    }

    // =================================================================
    // ゲーム決着・リザルトおよび公式レート変動通知
    // =================================================================
    socket.on('game_over', (result) => {
        // 結果に応じた壮大な演出
        let msg = "";
        if (result.winner === myUsername) {
            msg = `【大勝利】\n\n見事にマラソンの死線を制しました！\n獲得レート: +${result.rateChange} pt`;
        } else if (result.winner === 'DRAW') {
            msg = `【完全同時同点ドロー】\n\n数値が1ミリの狂いもなく完全一致しました。\nレートの変動はありません。`;
        } else {
            msg = `【敗北】\n\n対戦相手に栄誉を奪われました。\n喪失レート: -${result.rateChange} pt`;
        }

        alert(msg);
        // ロケーションリロードをかけて最新のレートを安全に再同期
        location.reload();
    });

    function startAIGame() {
        alert("練習用AI空間を構築します。この試合は公式記録に一切残りません。");
        // ※AI戦トリガーシグナル送信処理
        socket.emit('trigger_ai_match');
    }
</script>
