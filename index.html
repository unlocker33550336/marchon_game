<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MARATHON</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: #e0e0e0; padding: 10px; margin: 0; user-select: none; }
        .container { max-width: 600px; margin: 0 auto; padding: 5px; }
        h1 { text-align: center; color: #ff4757; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 22px; }
        
        /* --- 1000%対応 マラソンコース --- */
        .marathon-track { background: #222; border: 2px solid #333; border-radius: 12px; margin-bottom: 15px; position: relative; height: 70px; overflow: hidden; }
        .lane { height: 35px; position: relative; display: flex; align-items: center; transition: background-color 0.5s; }
        #lane-p1 { border-bottom: 1px dashed #444; background-color: #2e2e2e; }
        #lane-p2 { background-color: #2e2e2e; }
        .lane-label { font-size: 11px; color: #fff; font-weight: bold; position: absolute; left: 5px; z-index: 2; background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 3px; }
        .goal-line { position: absolute; right: 20px; top: 0; bottom: 0; width: 4px; background: repeating-linear-gradient(0deg, #fff, #fff 5px, #000 5px, #000 10px); z-index: 1; }
        .runner { font-size: 22px; position: absolute; left: 0%; transition: left 1s ease-out; transform: translateX(10px); z-index: 3; }
        
        .status-board { background: #1e1e1e; padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 15px; }
        .timer { font-size: 20px; color: #ffa502; font-weight: bold; font-family: monospace; }

        .connection-panel { background: #2f3542; border: 2px solid #54a0ff; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .connect-btn { background: #54a0ff; color: white; padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .waiting-screen { background: #2f3542; border: 2px solid #ffa502; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; display: none; }

        .game-area { display: none; position: relative; }
        .lock-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.2); z-index: 10; display: none; border-radius: 12px; }

        /* 🌟 ラフ画再現：2段対面型フィールド（縦2列×横4列） */
        .field-board { background: #1e1e1e; border: 2px solid #333; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .field-section-title { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .field-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .field-row.opponent-row { margin-bottom: 0; }
        
        /* カードハメ込み枠 */
        .card-slot { background: #26262b; border: 2px dashed #444; border-radius: 10px; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all 0.3s; }
        .card-slot.hover { border-color: #54a0ff; background: #2d3d52; }
        .slot-label { font-size: 9px; color: #666; position: absolute; bottom: 4px; pointer-events: none; font-weight: bold; }

        .hand-section { background: #1c1c1e; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #444; }
        .card-container { display: flex; gap: 10px; justify-content: center; min-height: 90px; align-items: center; }

        /* 🌟 カードのデザイン（ドラッグ用） */
        .card { width: 65px; height: 85px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; cursor: grab; shadow: 0 4px 6px rgba(0,0,0,0.4); text-align: center; font-size: 13px; padding: 3px; box-sizing: border-box; transition: transform 0.2s; }
        .card:active { cursor: grabbing; transform: scale(0.95); }
        .card[data-type="sun"] { background: linear-gradient(135deg, #ff9f43, #ff5252); }
        .card[data-type="stone"] { background: linear-gradient(135deg, #57606f, #2f3542); }
        .card[data-type="water"] { background: linear-gradient(135deg, #54a0ff, #00d2d3); }
        .card[data-type="cheer"] { background: linear-gradient(135deg, #10ac84, #1dd1a1); }
        
        /* 相手の伏せカード（？） */
        .card.mystery-card { background: linear-gradient(135deg, #2c3e50, #34495e); border: 2px solid #7f8c8d; color: #fff; font-size: 20px; font-weight: bold; cursor: not-allowed; }

        .event-trigger-section { background: #2f3542; border: 2px solid #ffa502; border-radius: 12px; padding: 10px; margin-bottom: 15px; text-align: center; display: none; }
        .event-btn { background: #ffa502; color: #000; font-weight: bold; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* 🌟 ナビゲーション・戻るボタン */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: #333; color: #ccc; border: 1px solid #444; padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .action-btn { background: #ff4757; color: #fff; border: none; padding: 12px; width: 100%; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }
        
        .tab-content { background: #1e1e1e; border: 1px solid #333; padding: 12px; border-radius: 8px; min-height: 120px; font-size: 13px; margin-top: 15px; }
        .chat-logs { max-height: 180px; overflow-y: auto; font-family: monospace; color: #4cd137; white-space: pre-wrap; line-height: 1.4; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" id="menu-back-btn" onclick="backToMenu()">↩ モード選択に戻る</button>
        <h1>THE MARATHON</h1>
        <div style="width:90px;"></div>
    </div>
    
    <div class="marathon-track">
        <div class="goal-line"></div>
        <div class="lane" id="lane-p1"><span class="lane-label">P1</span><div class="runner" id="runner-p1">🏃</div></div>
        <div class="lane" id="lane-p2"><span class="lane-label">P2</span><div class="runner" id="runner-p2">🏃</div></div>
    </div>

    <div class="status-board">
        <div>ターン: <span id="turn-count">1</span></div>
        <div class="timer" id="timer-display">05:00</div>
    </div>

    <div class="connection-panel" id="connection-panel">
        <h2>オンライン対戦サーバーへの接続</h2>
        <button class="connect-btn" onclick="connectToServer()">🌐 サーバーに接続して参戦</button>
    </div>

    <div class="waiting-screen" id="waiting-screen">
        <h2>対戦相手を待っています...</h2>
        <p id="player-role-text">入室中...</p>
    </div>

    <div class="event-trigger-section" id="event-panel">
        <p style="margin:0 0 5px 0; font-size:12px; color:#ffa502;">⚡ 【15ターン経過】イベント実行権が与えられました</p>
        <button class="event-btn" id="evt-btn" onclick="declareEvent()">このターンにイベントを発動する</button>
    </div>

    <div class="game-area" id="game-area">
        <div class="lock-overlay" id="lock-overlay"></div>

        <div class="field-board">
            <div class="field-section-title">👤 自分側のフィールド</div>
            <div class="field-row" id="my-field-row">
                <div class="card-slot" id="slot-my-self"><span class="slot-label">📥自分用</span></div>
                <div class="card-slot" id="slot-my-target"><span class="slot-label">📤相手用</span></div>
                <div class="card-slot" id="slot-my-waste"><span class="slot-label">🗑️廃棄</span></div>
                <div class="card-slot" id="slot-my-keep"><span class="slot-label">📦保留</span></div>
            </div>

            <div class="field-section-title" style="margin-top:15px;">👥 相手側のフィールド（中身は内緒）</div>
            <div class="field-row opponent-row" id="opp-field-row">
                <div class="card-slot" id="slot-opp-self"><span class="slot-label">自分用</span></div>
                <div class="card-slot" id="slot-opp-target"><span class="slot-label">相手用</span></div>
                <div class="card-slot" id="slot-opp-waste"><span class="slot-label">廃棄</span></div>
                <div class="card-slot" id="slot-opp-keep"><span class="slot-label">保留</span></div>
            </div>
        </div>

        <div class="hand-section">
            <div class="section-title" id="hand-title">あなたの手札</div>
            <div class="card-container" id="zone-hand"></div>
        </div>

        <button class="action-btn" id="submit-btn" onclick="submitOnlineTurn()">配置を確定する</button>
    </div>

    <div class="tab-content">
        <div class="chat-logs" id="chat-logs">【システム】参戦すると、ここに「答え合わせログ」が流れます。</div>
    </div>
</div>

<script>
    let socket = null;
    let myPlayerNumber = null; 
    let timerInterval = null;
    let timerSeconds = 300;
    let localKeep = [];
    let isLocked = false;
    let eventReserved = false;

    window.onload = () => {
        // ゲーム中以外（タイトル画面）なら戻るボタンを押せる
        document.getElementById('menu-back-btn').disabled = false;
    };

    function connectToServer() {
        try { socket = io(); } catch(e) { alert("サーバーに接続できませんでした"); return; }
        document.getElementById('connection-panel').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'block';
        document.getElementById('menu-back-btn').disabled = false; // 待機中も戻れる

        socket.on('assigned_player', (num) => {
            myPlayerNumber = num;
            document.getElementById('player-role-text').innerText = `あなたは「プレイヤー ${num}」です。`;
        });

        socket.on('game_start', () => {
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            // 🌟 ゲーム中は戻るボタンを完全ロック！逃亡禁止！
            document.getElementById('menu-back-btn').disabled = true;
            unlockScreen();
            setupHandAndBoxes();
            startTimer(300);
        });

        // 🌟 相手がどこかの枠にカードをドラッグ配置した「裏向き（シルエット）」のリアルタイム同期
        socket.on('opponent_moving_card', (data) => {
            // 相手側の枠にある既存の裏向きカードを一旦クリア
            document.querySelectorAll('.opponent-row .mystery-card').forEach(c => c.remove());
            
            if (data.targetZone && data.targetZone !== 'hand') {
                const targetSlot = document.getElementById(`slot-opp-${data.targetZone}`);
                if (targetSlot) {
                    const mysteryCard = document.createElement('div');
                    mysteryCard.className = 'card mystery-card';
                    mysteryCard.innerText = '?';
                    targetSlot.appendChild(mysteryCard);
                }
            }
        });

        socket.on('game_over_timeout', (data) => {
            clearInterval(timerInterval); lockScreen();
            writeLog(`\n【遅延行為】プレイヤー ${data.foulPlayer} が5分以上経過したため、失格となりました。`);
            document.getElementById('menu-back-btn').disabled = false; // 終了したから戻れる
            alert(`【ゲーム終了】プレイヤー ${data.foulPlayer} が時間切れにより失格敗北しました。`);
        });

        // 🌟 1000%完走のクリア判定
        socket.on('game_clear', (data) => {
            clearInterval(timerInterval); lockScreen();
            writeLog(`\n🎉 🎉 【ゴール達成！！】勝者：プレイヤー ${data.winner}！`);
            document.getElementById('menu-back-btn').disabled = false; // 終了したから戻れる
            alert(`【ゴール！】プレイヤー ${data.winner} が1000%マラソンを制覇しました！`);
        });

        socket.on('round_result', (data) => {
            document.getElementById('turn-count').innerText = data.nextTurn;
            
            // 🌟 1000%対応：進捗率をleftの%幅に変換（最大85%手前）
            document.getElementById('runner-p1').style.left = Math.min((data.p1Progress / 10), 85) + "%";
            document.getElementById('runner-p2').style.left = Math.min((data.p2Progress / 10), 85) + "%";

            updateLaneColor('lane-p1', data.p1Temp);
            updateLaneColor('lane-p2', data.p2Temp);

            // 🌟 全カードが「ドン！」と表向いた答え合わせログを流す
            writeLog(data.resultLog);

            // 15ターン目の大技チェック
            let iCan = myPlayerNumber === 1 ? data.p1CanEvent : data.p2CanEvent;
            document.getElementById('event-panel').style.display = iCan ? 'block' : 'none';

            localKeep = data.keeps[myPlayerNumber === 1 ? 'p1' : 'p2'];
            eventReserved = false;
            document.getElementById('evt-btn').disabled = false;
            document.getElementById('evt-btn').innerText = "このターンにイベントを発動する";

            // 相手枠の裏向き表示を一度リセット
            document.querySelectorAll('.opponent-row .mystery-card').forEach(c => c.remove());

            unlockScreen();
            setupHandAndBoxes();
            startTimer(300);
        });
    }

    function declareEvent() {
        eventReserved = true;
        document.getElementById('evt-btn').disabled = true;
        document.getElementById('evt-btn').innerText = "イベント発動予約済み";
        socket.emit('reserve_event', { player: myPlayerNumber });
    }

    function writeLog(msg) {
        const logs = document.getElementById('chat-logs');
        logs.innerHTML += `\n${msg}`;
        logs.scrollTop = logs.scrollHeight;
    }

    function updateLaneColor(laneId, temp) {
        const laneEl = document.getElementById(laneId);
        if (temp < 5) laneEl.style.backgroundColor = "#4a69bd";
        else if (temp === 5) laneEl.style.backgroundColor = "#2e2e2e";
        else if (temp >= 6 && temp <= 9) laneEl.style.backgroundColor = "#f1c40f";
        else if (temp >= 10 && temp <= 14) laneEl.style.backgroundColor = "#e67e22";
        else laneEl.style.backgroundColor = `rgb(${Math.min(150, 70 + (temp - 15) * 15)}, 15, 15)`;
    }

    function lockScreen() {
        isLocked = true;
        document.getElementById('lock-overlay').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;
    }

    function unlockScreen() {
        isLocked = false;
        document.getElementById('lock-overlay').style.display = 'none';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').innerText = "配置を確定する";
    }

    // カードドラッグの移動をサーバー（相手）にリアルタイム報告
    function notifyCardMove(slotId) {
        if(isLocked || !socket) return;
        let zoneName = slotId.replace('slot-my-', '');
        socket.emit('player_move_card', { player: myPlayerNumber, targetZone: zoneName });
    }

    function canAddToKeep(cardId, targetSlotId) {
        if (targetSlotId !== 'slot-my-keep') return true;
        const keepSlot = document.getElementById('slot-my-keep');
        // すでに中にカード（ラベル文字以外）があるか判定
        const hasCard = Array.from(keepSlot.children).some(el => el.classList.contains('card'));
        if (hasCard) {
            alert("保留枠には最大1枚しか置けません！");
            return false;
        }
        return true;
    }

    function setupHandAndBoxes() {
        const handZone = document.getElementById('zone-hand');
        // 自分側の4つのハメ込み枠を一旦初期化（ラベルだけ残す）
        document.querySelectorAll('#my-field-row .card-slot').forEach(slot => {
            const label = slot.querySelector('.slot-label');
            slot.innerHTML = '';
            if(label) slot.appendChild(label);
        });
        handZone.innerHTML = '';

        const types = ['sun', 'stone', 'water', 'cheer'];
        const labels = { sun: '太陽', stone: '石', water: '水', cheer: '応援' };

        types.forEach(type => {
            const card = document.createElement('div');
            card.className = 'card'; card.draggable = true; card.dataset.type = type; card.id = `card-${type}`; card.innerText = labels[type];
            
            if (localKeep.includes(type)) {
                document.getElementById('slot-my-keep').appendChild(card);
            } else {
                handZone.appendChild(card);
            }
        });

        // 🌟 ドラッグイベントリスナーの付与
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                if(isLocked) { e.preventDefault(); return; }
                e.dataTransfer.setData('text/plain', e.target.id);
            });
        });
    }

    // 枠側の受け入れ処理
    document.querySelectorAll('.card-slot, #zone-hand').forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            if(isLocked) return;
            const id = e.dataTransfer.getData('text/plain');
            
            // 自分側の枠、または手札に戻す場合のみドロップを許可
            if(zone.id.startsWith('slot-my-') || zone.id === 'zone-hand') {
                if (!canAddToKeep(id, zone.id)) return; // 1枚制限チェック
                
                const dragged = document.getElementById(id);
                if (dragged) {
                    zone.appendChild(dragged);
                    notifyCardMove(zone.id);
                }
            }
        });
    });

    function startTimer(seconds) {
        clearInterval(timerInterval); timerSeconds = seconds; updateTimerDisplay();
        timerInterval = setInterval(() => {
            timerSeconds--; updateTimerDisplay();
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                socket.emit('player_timeout', { player: myPlayerNumber });
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const min = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        const sec = String(timerSeconds % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `${min}:${sec}`;
    }

    function submitOnlineTurn() {
        if(isLocked) return;
        clearInterval(timerInterval);
        
        const getCards = (slotId) => {
            const slot = document.getElementById(slotId);
            return Array.from(slot.children).filter(el => el.classList.contains('card')).map(c => c.dataset.type);
        };

        const choice = {
            self: getCards('slot-my-self'),
            target: getCards('slot-my-target'),
            waste: getCards('slot-my-waste'),
            keep: getCards('slot-my-keep'),
            hand: Array.from(document.getElementById('zone-hand').children).map(c => c.dataset.type)
        };

        if (choice.hand.length > 0) {
            alert("手札枠に残っているカードがあります！4マスの中のどこかへドラッグしてください。");
            startTimer(timerSeconds); return;
        }

        lockScreen();
        document.getElementById('submit-btn').innerText = "相手の入力を待っています...";
        socket.emit('submit_turn', { player: myPlayerNumber, choice: choice });
    }

    function backToMenu() {
        // リロードをかけて完全に最初の接続画面に戻す
        localStorage.removeItem('marathon_role');
        window.location.reload();
    }

    function switchTab(tab) {
        document.getElementById('content-rule').style.display = tab === 'rule' ? 'block' : 'none';
        document.getElementById('chat-logs').style.display = tab === 'chat' ? 'block' : 'none';
        document.getElementById('tab-rule-btn').className = tab === 'rule' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-chat-btn').className = tab === 'chat' ? 'tab-btn active' : 'tab-btn';
    }
</script>
</body>
</html>
