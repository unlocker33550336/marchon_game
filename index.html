<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GAME PLATFORM - 中央統合ロビー</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0f0f12; color: #e2e8f0; padding: 20px; margin: 0; user-select: none; }
        .container { max-width: 800px; margin: 40px auto; padding: 10px; }
        h1 { text-align: center; color: #ff4757; text-transform: uppercase; letter-spacing: 3px; font-size: 28px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,71,87,0.4); }
        
        .auth-panel, .lobby-panel { background: #15151a; border: 2px solid #26262b; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-input { width: 80%; max-width: 400px; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 8px; background: #1c1c24; color: #fff; font-size: 15px; transition: border-color 0.3s; }
        .auth-input:focus { border-color: #ff4757; outline: none; }
        
        /* プレイヤー情報カード */
        .user-profile-card { background: linear-gradient(135deg, #1c1c24, #22222f); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #2d2d3d; display: flex; justify-content: space-around; align-items: center; wrap: wrap; }
        .profile-item { text-align: center; padding: 10px 20px; }
        .profile-label { font-size: 12px; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .profile-value { font-size: 20px; font-weight: bold; color: #fff; }
        
        /* 統合ランクバッジ */
        .badge { padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .rank-NORMAL { background: #4a5568; color: #fff; }
        .rank-ELITE { background: #48bb78; color: #fff; box-shadow: 0 0 10px rgba(72,187,120,0.4); }
        .rank-PREMIUM { background: #4299e1; color: #fff; box-shadow: 0 0 10px rgba(66,153,225,0.4); }
        .rank-VIP { background: #ed8936; color: #fff; box-shadow: 0 0 15px rgba(237,137,54,0.6); animation: vipPulse 2s infinite; }
        .rank-GUEST { background: #a0aec0; color: #1a202c; }
        @keyframes vipPulse { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }

        /* ゲーム筐体セレクトグリッド */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 25px; }
        .game-card { background: #1c1c24; border: 1px solid #2d2d3d; border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); text-align: center; position: relative; overflow: hidden; }
        .game-card:hover { transform: translateY(-5px); border-color: #ff4757; box-shadow: 0 8px 20px rgba(255,71,87,0.15); }
        
        /* FLOWER GAME専用のホバー色 */
        .game-card.flower-card:hover { border-color: #9b5de5; box-shadow: 0 8px 20px rgba(155,93,229,0.15); }

        .game-card h3 { margin: 0 0 10px 0; font-size: 18px; color: #fff; }
        .game-card p { margin: 0; font-size: 12px; color: #718096; line-height: 1.5; }
        
        .game-status-tag { display: inline-block; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-bottom: 10px; text-transform: uppercase; }
        .status-active { background: rgba(72,187,120,0.15); color: #48bb78; border: 1px solid #48bb78; }
        .status-active-flower { background: rgba(155,93,229,0.15); color: #9b5de5; border: 1px solid #9b5de5; }
        .status-locked { background: rgba(113,128,150,0.15); color: #a0aec0; border: 1px solid #4a5568; cursor: not-allowed; }
        
        .game-card.disabled { cursor: not-allowed; opacity: 0.6; }
        .game-card.disabled:hover { transform: none; border-color: #2d2d3d; box-shadow: none; }

        .action-btn { background: #ff4757; color: #fff; border: none; padding: 12px 25px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .action-btn:hover { background: #ff6b81; }
        .hidden { display: none !important; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <h1>THE GAME PLATFORM</h1>

    <div id="auth-panel" class="auth-panel">
        <h2 style="margin-bottom: 20px; color: #fff;">中央プラットフォーム認証</h2>
        <input type="text" id="auth-username" class="auth-input" placeholder="ユーザー識別名">
        <input type="password" id="auth-password" class="auth-input" placeholder="暗号パスワード">
        <div style="margin-top: 15px;">
            <button class="action-btn" onclick="login()" style="width: 40%; margin-right: 5%;">ログイン</button>
            <button class="action-btn" onclick="register()" style="width: 40%; background: #48bb78;">新規登録</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #2d2d3d; margin: 20px 0;">
        <button class="action-btn" onclick="loginGuest()" style="background: #4a5568; width: 85%;">お試しゲストモードで入場</button>
    </div>

    <div id="lobby-panel" class="lobby-panel hidden">
        <h2 style="color: #fff; text-align: left; margin-bottom: 20px;">プラットフォーム・メインメニュー</h2>
        
        <div class="user-profile-card">
            <div class="profile-item">
                <div class="profile-label">プレイヤー名</div>
                <div class="profile-value" id="user-name" style="color: #48bb78;">----</div>
            </div>
            <div class="profile-item">
                <div class="profile-label">プラットフォーム階層</div>
                <div style="margin-top: 5px;"><span id="user-rank" class="badge rank-NORMAL">NORMAL</span></div>
            </div>
            <div class="profile-item">
                <div class="profile-label">共通レート</div>
                <div class="profile-value" id="user-rate" style="color: #ff4757;">--- pt</div>
            </div>
            <div class="profile-item">
                <div class="profile-label">全ゲーム通算戦績</div>
                <div class="profile-value" id="user-stats" style="font-size: 14px; color: #a0aec0;">0勝 / 0敗</div>
            </div>
        </div>

        <h3 style="text-align: left; color: #fff; border-bottom: 1px solid #2d2d3d; padding-bottom: 10px;">遊戯タイトル一覧</h3>
        
        <div class="game-grid">
            <!-- GAME 1: THE MARATHON -->
            <div class="game-card" onclick="enterGameRoom('marathon')">
                <div class="game-status-tag status-active">稼働中（公式レート）</div>
                <h3 style="color: #ff4757;">THE MARATHON</h3>
                <p>試練をボックスへ配置し、ゴールを競うマラソンレース。</p>
            </div>

            <!-- GAME 2: FLOWER GAME (新規統合) -->
            <div class="game-card flower-card" onclick="enterGameRoom('flower')">
                <div class="game-status-tag status-active-flower">稼働中（公式レート）</div>
                <h3 style="color: #9b5de5;">FLOWER GAME 🪻</h3>
                <p>花を送り合うゲーム。</p>
            </div>

            <!-- GAME 3: 開発中 -->
            <div class="game-card disabled">
                <div class="game-status-tag status-locked">開発中</div>
                <h3>nontitle</h3>
                <p>（近日公開予定）。</p>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: right;">
            <button class="action-btn" onclick="logout()" style="background: #e53e3e; font-size: 13px; padding: 8px 20px;">ログアウト</button>
        </div>
    </div>
</div>

<script>
    let socket = null;

    window.onload = function() {
        const savedUser = localStorage.getItem('marathon_user');
        const savedToken = localStorage.getItem('marathon_token');
        if (savedUser && savedToken) {
            setupSocket();
            socket.emit('login', { username: savedUser, token: savedToken });
        }
    };

    function setupSocket() {
        if (socket) return;
        socket = io();

        socket.on('register_res', (res) => { alert(res.msg); });

        socket.on('login_res', (res) => {
            if (res.success) {
                
                // admin特権ログイン時の強制ルーティング分岐
                if (res.isAdmin) {
                    localStorage.setItem('admin_token', res.token);
                    alert("【SYSTEM WARNING】管理者権限（GM）を検出。コントロールパネルへ遷移します。");
                    location.href = '/admin';
                    return;
                }
                
                localStorage.setItem('marathon_user', res.username);
                const pwd = document.getElementById('auth-password').value.trim();
                if (pwd) localStorage.setItem('marathon_token', pwd);

                document.getElementById('auth-panel').classList.add('hidden');
                document.getElementById('lobby-panel').classList.remove('hidden');

                document.getElementById('user-name').innerText = res.username;
                document.getElementById('user-rate').innerText = res.rate + " pt";
                
                const rankBadge = document.getElementById('user-rank');
                rankBadge.innerText = res.rank;
                rankBadge.className = `badge rank-${res.rank}`;

                if (res.win !== undefined && res.lose !== undefined) {
                    document.getElementById('user-stats').innerText = `${res.win} 勝 / ${res.lose} 敗`;
                }
            } else {
                alert(res.msg || "ログインに失敗しました");
                clearAuthBackup();
            }
        });
    }

    function login() {
        setupSocket();
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value.trim();
        if (!u || !p) return alert("ユーザー名とパスワードを入力してください");
        socket.emit('login', { username: u, password: p });
    }

    function register() {
        setupSocket();
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value.trim();
        if (!u || !p) return alert("ユーザー名とパスワードを入力してください");
        socket.emit('register', { username: u, password: p });
    }

    function loginGuest() {
        setupSocket();
        socket.emit('login_guest');
    }

    function enterGameRoom(gameId) {
        if (gameId === 'marathon') {
            location.href = '/marathon.html';
        } else if (gameId === 'flower') {
            location.href = '/flower.html'; // 🪻 追加したルーティング
        }
    }

    function logout() {
        clearAuthBackup();
        location.reload();
    }

    function clearAuthBackup() {
        localStorage.removeItem('marathon_user');
        localStorage.removeItem('marathon_token');
        localStorage.removeItem('marathon_mode');
    }
</script>
</body>
</html>
